<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Arcly — Interactive 24-hour clock time tracker. Drag on the clock to log your daily activities.">
  <title>Arcly — Daily Time Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & ROOT ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e17;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e4e6f0;
      --text-muted: #7a7f9a;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.35);
      --danger: #ff6b6b;
      --radius: 16px;
      --font: 'Inter', -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== AMBIENT BACKGROUND ===== */
    body::before {
      content: '';
      position: fixed;
      top: -40%; left: -20%;
      width: 80vw; height: 80vw;
      background: radial-gradient(circle, rgba(108,92,231,0.12), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%; right: -20%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(0,206,209,0.08), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== LAYOUT ===== */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 60px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c5ce7, #00cec9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .header p {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-top: 6px;
    }

    .main-layout {
      display: flex;
      gap: 36px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1100px;
    }

    /* ===== CLOCK CONTAINER ===== */
    .clock-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.3);
      position: relative;
    }

    .clock-wrap {
      position: relative;
      cursor: crosshair;
    }

    #clockCanvas {
      display: block;
      border-radius: 50%;
    }

    .clock-tooltip {
      position: absolute;
      background: rgba(20,22,35,0.92);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      z-index: 10;
      backdrop-filter: blur(12px);
    }
    .clock-tooltip.visible {
      opacity: 1;
    }

    .clock-help {
      margin-top: 16px;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
    }
    .clock-help span {
      display: inline-block;
      background: rgba(108,92,231,0.15);
      border: 1px solid rgba(108,92,231,0.3);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #a29bfe;
      margin: 0 2px;
    }

    /* ===== ACTIVITIES PANEL ===== */
    .activities-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 24px;
      width: 360px;
      max-height: 540px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
    }

    .activities-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .activities-header h2 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }
    .activities-count {
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(108,92,231,0.18);
      color: #a29bfe;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .activities-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }
    .activities-list::-webkit-scrollbar { width: 4px; }
    .activities-list::-webkit-scrollbar-track { background: transparent; }
    .activities-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .activity-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      transition: all 0.2s;
      animation: slideIn 0.3s ease-out;
    }
    .activity-item:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255,255,255,0.1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .activity-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }
    .activity-info {
      flex: 1;
      min-width: 0;
    }
    .activity-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .activity-time {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .activity-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.2s;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .activity-delete:hover {
      color: var(--danger);
      background: rgba(255,107,107,0.1);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .empty-state .icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .clear-all-btn {
      margin-top: 14px;
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.2);
      color: var(--danger);
      padding: 9px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      font-family: var(--font);
      transition: all 0.2s;
      width: 100%;
    }
    .clear-all-btn:hover {
      background: rgba(255,107,107,0.15);
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #151827;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 380px;
      max-width: 92vw;
      transform: translateY(20px) scale(0.96);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .modal-overlay.active .modal {
      transform: translateY(0) scale(1);
    }

    .modal h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .modal .modal-time {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 20px;
    }

    .modal label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .modal input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    .modal input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .modal input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .category-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 6px;
      cursor: pointer;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 500;
      font-family: var(--font);
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .category-btn:hover {
      background: rgba(255,255,255,0.07);
    }
    .category-btn.selected {
      border-color: var(--cat-color, var(--accent));
      background: var(--cat-bg, var(--accent-glow));
      color: var(--text);
    }
    .category-btn .cat-icon {
      font-size: 1.2rem;
      display: block;
      margin-bottom: 4px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-cancel {
      background: rgba(255,255,255,0.06);
      color: var(--text-muted);
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); }
    .btn-save {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-save:hover { box-shadow: 0 6px 30px rgba(108,92,231,0.5); transform: translateY(-1px); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 800px) {
      .main-layout { flex-direction: column; align-items: center; }
      .activities-panel { width: 100%; max-width: 440px; max-height: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>⏳ Arcly</h1>
      <p>Drag on the clock to track your day</p>
    </header>

    <div class="main-layout">
      <!-- Clock -->
      <div class="clock-panel">
        <div class="clock-wrap" id="clockWrap">
          <canvas id="clockCanvas" width="420" height="420"></canvas>
          <div class="clock-tooltip" id="tooltip"></div>
        </div>
        <div class="clock-help">
          <span>Click</span> &amp; <span>Drag</span> on the clock edge to log an activity
        </div>
      </div>

      <!-- Activity List -->
      <div class="activities-panel">
        <div class="activities-header">
          <h2>Activities</h2>
          <span class="activities-count" id="activityCount">0</span>
        </div>
        <div class="activities-list" id="activityList">
          <div class="empty-state" id="emptyState">
            <div class="icon">🕐</div>
            <p>No activities yet.<br>Drag on the clock to get started!</p>
          </div>
        </div>
        <button class="clear-all-btn" id="clearAllBtn" style="display:none;">Clear All Activities</button>
      </div>
    </div>
  </div>

  <!-- Activity Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Log Activity</h3>
      <p class="modal-time" id="modalTime">1:00 AM — 3:00 AM</p>

      <label for="activityInput">What did you do?</label>
      <input type="text" id="activityInput" placeholder="e.g. Studied physics, Played football…" maxlength="60" autocomplete="off">

      <label>Category</label>
      <div class="category-grid" id="categoryGrid"></div>

      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-save" id="btnSave">Save Activity</button>
      </div>
    </div>
  </div>

  <script>
  (() => {
    // ===== CATEGORIES =====
    const CATEGORIES = [
      { name: 'Study',    icon: '📚', color: '#6c5ce7' },
      { name: 'Work',     icon: '💼', color: '#0984e3' },
      { name: 'Exercise', icon: '🏃', color: '#00b894' },
      { name: 'Play',     icon: '🎮', color: '#e17055' },
      { name: 'Rest',     icon: '😴', color: '#636e72' },
      { name: 'Other',    icon: '✨', color: '#fdcb6e' },
    ];

    // ===== STATE =====
    let activities = JSON.parse(localStorage.getItem('arcly_activities') || '[]');
    let dragging = false;
    let dragStartAngle = null;
    let dragEndAngle = null;
    let selectedCategory = 0;

    // ===== DOM =====
    const canvas  = document.getElementById('clockCanvas');
    const ctx     = canvas.getContext('2d');
    const wrap    = document.getElementById('clockWrap');
    const tooltip = document.getElementById('tooltip');
    const modal   = document.getElementById('modalOverlay');
    const modalTime = document.getElementById('modalTime');
    const actInput  = document.getElementById('activityInput');
    const catGrid   = document.getElementById('categoryGrid');
    const actList   = document.getElementById('activityList');
    const actCount  = document.getElementById('activityCount');
    const emptyState = document.getElementById('emptyState');
    const clearBtn  = document.getElementById('clearAllBtn');

    const SIZE = 420;
    const CX = SIZE / 2;
    const CY = SIZE / 2;
    const OUTER_R = SIZE / 2 - 12;
    const INNER_R = OUTER_R - 38;
    const ARC_R   = (OUTER_R + INNER_R) / 2;
    const ARC_W   = OUTER_R - INNER_R - 6;

    // ===== HELPERS =====
    function angleToHour(angle) {
      // angle: 0 = top (12 o'clock), clockwise, in radians
      let h = (angle / (2 * Math.PI)) * 24;
      if (h < 0) h += 24;
      return h % 24;
    }
    function hourToAngle(h) {
      return ((h % 24) / 24) * 2 * Math.PI;
    }
    function formatHour(h) {
      h = ((h % 24) + 24) % 24;
      const hr = Math.floor(h);
      const mn = Math.round((h - hr) * 60);
      const period = hr >= 12 ? 'PM' : 'AM';
      const display = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr;
      return `${display}:${mn.toString().padStart(2,'0')} ${period}`;
    }
    function snapToQuarter(h) {
      return Math.round(h * 4) / 4;
    }
    function getMouseAngle(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left - CX * (rect.width / SIZE);
      const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top  - CY * (rect.height / SIZE);
      let angle = Math.atan2(x, -y); // 0 at top, clockwise
      if (angle < 0) angle += 2 * Math.PI;
      return angle;
    }
    function isOnRing(e) {
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / SIZE;
      const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left - CX * scale;
      const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top  - CY * scale;
      const dist = Math.sqrt(x * x + y * y) / scale;
      return dist >= INNER_R - 15 && dist <= OUTER_R + 15;
    }
    function arcSpan(startAngle, endAngle) {
      let span = endAngle - startAngle;
      if (span < 0) span += 2 * Math.PI;
      return span;
    }

    // ===== SAVE / LOAD =====
    function save() {
      localStorage.setItem('arcly_activities', JSON.stringify(activities));
    }

    // ===== DRAW CLOCK =====
    function draw() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = SIZE * dpr;
      canvas.height = SIZE * dpr;
      canvas.style.width = SIZE + 'px';
      canvas.style.height = SIZE + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      ctx.clearRect(0, 0, SIZE, SIZE);

      // Outer ring
      ctx.beginPath();
      ctx.arc(CX, CY, OUTER_R, 0, 2 * Math.PI);
      ctx.arc(CX, CY, INNER_R, 0, 2 * Math.PI, true);
      ctx.fillStyle = 'rgba(255,255,255,0.025)';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(CX, CY, OUTER_R, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(CX, CY, INNER_R, 0, 2 * Math.PI);
      ctx.stroke();

      // Hour ticks & labels
      for (let i = 0; i < 24; i++) {
        const angle = (i / 24) * 2 * Math.PI - Math.PI / 2;
        const cos = Math.cos(angle);
        const sin = Math.sin(angle);
        const isMain = i % 3 === 0;
        const tickOuter = OUTER_R - 1;
        const tickInner = isMain ? OUTER_R - 10 : OUTER_R - 6;

        ctx.beginPath();
        ctx.moveTo(CX + cos * tickOuter, CY + sin * tickOuter);
        ctx.lineTo(CX + cos * tickInner, CY + sin * tickInner);
        ctx.strokeStyle = isMain ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.12)';
        ctx.lineWidth = isMain ? 1.5 : 1;
        ctx.stroke();

        if (isMain) {
          const labelR = OUTER_R + 15;
          ctx.save();
          ctx.font = '500 11px Inter, sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(i === 0 ? '0' : i.toString(), CX + cos * labelR, CY + sin * labelR);
          ctx.restore();
        }
      }

      // ===== ACTIVITY ARCS =====
      activities.forEach(act => {
        const sA = hourToAngle(act.startHour) - Math.PI / 2;
        const eA = hourToAngle(act.endHour) - Math.PI / 2;
        const cat = CATEGORIES[act.category] || CATEGORIES[5];

        ctx.beginPath();
        ctx.arc(CX, CY, ARC_R, sA, eA, false);
        ctx.strokeStyle = cat.color;
        ctx.lineWidth = ARC_W;
        ctx.lineCap = 'butt';
        ctx.globalAlpha = 0.55;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // glow
        ctx.beginPath();
        ctx.arc(CX, CY, ARC_R, sA, eA, false);
        ctx.strokeStyle = cat.color;
        ctx.lineWidth = ARC_W + 4;
        ctx.globalAlpha = 0.12;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // label
        const midAngle = sA + arcSpan(sA, eA) / 2;
        const span = arcSpan(sA, eA);
        if (span > 0.22) {
          const lx = CX + Math.cos(midAngle) * (ARC_R);
          const ly = CY + Math.sin(midAngle) * (ARC_R);
          ctx.save();
          ctx.font = '600 10px Inter, sans-serif';
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.globalAlpha = 0.85;
          // truncate
          let label = act.name;
          if (span < 0.5 && label.length > 6) label = label.substring(0,5) + '…';
          else if (span < 0.8 && label.length > 10) label = label.substring(0,9) + '…';
          ctx.fillText(label, lx, ly);
          ctx.restore();
          ctx.globalAlpha = 1;
        }
      });

      // ===== DRAG PREVIEW =====
      if (dragging && dragStartAngle !== null && dragEndAngle !== null) {
        const sA = dragStartAngle - Math.PI / 2;
        const eA = dragEndAngle - Math.PI / 2;
        const cat = CATEGORIES[selectedCategory];

        ctx.beginPath();
        ctx.arc(CX, CY, ARC_R, sA, eA, false);
        ctx.strokeStyle = cat.color;
        ctx.lineWidth = ARC_W;
        ctx.lineCap = 'butt';
        ctx.globalAlpha = 0.35;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // start/end markers
        [sA, eA].forEach(a => {
          ctx.beginPath();
          ctx.arc(CX + Math.cos(a) * ARC_R, CY + Math.sin(a) * ARC_R, 5, 0, 2 * Math.PI);
          ctx.fillStyle = '#fff';
          ctx.globalAlpha = 0.8;
          ctx.fill();
          ctx.globalAlpha = 1;
        });
      }

      // ===== CLOCK HANDS =====
      const now = new Date();
      const hrs = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
      const mins = now.getMinutes() + now.getSeconds() / 60;
      const secs = now.getSeconds() + now.getMilliseconds() / 1000;

      // hour hand (24h mapped to full rotation)
      const hAngle = (hrs / 24) * 2 * Math.PI - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(CX + Math.cos(hAngle) * (INNER_R - 30), CY + Math.sin(hAngle) * (INNER_R - 30));
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.stroke();

      // minute hand
      const mAngle = (mins / 60) * 2 * Math.PI - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(CX + Math.cos(mAngle) * (INNER_R - 16), CY + Math.sin(mAngle) * (INNER_R - 16));
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();

      // second hand
      const sAngle = (secs / 60) * 2 * Math.PI - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(CX, CY);
      ctx.lineTo(CX + Math.cos(sAngle) * (INNER_R - 10), CY + Math.sin(sAngle) * (INNER_R - 10));
      ctx.strokeStyle = '#6c5ce7';
      ctx.lineWidth = 1;
      ctx.lineCap = 'round';
      ctx.stroke();

      // center dot
      ctx.beginPath();
      ctx.arc(CX, CY, 4, 0, 2 * Math.PI);
      ctx.fillStyle = '#6c5ce7';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(CX, CY, 2, 0, 2 * Math.PI);
      ctx.fillStyle = '#fff';
      ctx.fill();

      // Digital time in center
      ctx.save();
      ctx.font = '600 16px Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const hh = now.getHours().toString().padStart(2, '0');
      const mm = now.getMinutes().toString().padStart(2, '0');
      ctx.fillText(`${hh}:${mm}`, CX, CY + 30);
      ctx.restore();

      requestAnimationFrame(draw);
    }

    // ===== DRAG INTERACTION =====
    function onPointerDown(e) {
      if (!isOnRing(e)) return;
      e.preventDefault();
      dragging = true;
      dragStartAngle = getMouseAngle(e);
      dragEndAngle = dragStartAngle;
      updateTooltip(e);
    }
    function onPointerMove(e) {
      if (!dragging) {
        // just show hour tooltip if hovering ring
        if (isOnRing(e)) {
          const angle = getMouseAngle(e);
          const hour = snapToQuarter(angleToHour(angle));
          tooltip.textContent = formatHour(hour);
          const rect = canvas.getBoundingClientRect();
          tooltip.style.left = ((e.clientX || e.touches?.[0]?.clientX) - rect.left + 14) + 'px';
          tooltip.style.top  = ((e.clientY || e.touches?.[0]?.clientY) - rect.top - 30) + 'px';
          tooltip.classList.add('visible');
        } else {
          tooltip.classList.remove('visible');
        }
        return;
      }
      e.preventDefault();
      dragEndAngle = getMouseAngle(e);
      updateTooltip(e);
    }
    function onPointerUp(e) {
      if (!dragging) return;
      dragging = false;
      tooltip.classList.remove('visible');

      const startHour = snapToQuarter(angleToHour(dragStartAngle));
      const endHour   = snapToQuarter(angleToHour(dragEndAngle));
      if (Math.abs(startHour - endHour) < 0.2) return; // too small

      openModal(startHour, endHour);
    }

    function updateTooltip(e) {
      const startH = snapToQuarter(angleToHour(dragStartAngle));
      const endH   = snapToQuarter(angleToHour(dragEndAngle));
      tooltip.textContent = `${formatHour(startH)} → ${formatHour(endH)}`;
      const rect = canvas.getBoundingClientRect();
      tooltip.style.left = ((e.clientX || e.touches?.[0]?.clientX) - rect.left + 14) + 'px';
      tooltip.style.top  = ((e.clientY || e.touches?.[0]?.clientY) - rect.top - 30) + 'px';
      tooltip.classList.add('visible');
    }

    // Mouse events
    canvas.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    // Touch events
    canvas.addEventListener('touchstart', e => onPointerDown(e.touches[0] ? e : e), { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); onPointerMove(e.touches[0] ? e : e); }, { passive: false });
    canvas.addEventListener('touchend', onPointerUp);

    // ===== MODAL =====
    function openModal(startH, endH) {
      modalTime.textContent = `${formatHour(startH)} → ${formatHour(endH)}`;
      actInput.value = '';
      selectedCategory = 0;
      renderCategoryButtons();
      modal.classList.add('active');
      modal._start = startH;
      modal._end = endH;
      setTimeout(() => actInput.focus(), 200);
    }
    function closeModal() {
      modal.classList.remove('active');
      dragStartAngle = null;
      dragEndAngle = null;
    }

    function renderCategoryButtons() {
      catGrid.innerHTML = '';
      CATEGORIES.forEach((cat, i) => {
        const btn = document.createElement('button');
        btn.className = 'category-btn' + (i === selectedCategory ? ' selected' : '');
        btn.style.setProperty('--cat-color', cat.color);
        btn.style.setProperty('--cat-bg', cat.color + '20');
        btn.innerHTML = `<span class="cat-icon">${cat.icon}</span>${cat.name}`;
        btn.addEventListener('click', () => {
          selectedCategory = i;
          renderCategoryButtons();
        });
        catGrid.appendChild(btn);
      });
    }

    document.getElementById('btnCancel').addEventListener('click', closeModal);
    document.getElementById('btnSave').addEventListener('click', () => {
      const name = actInput.value.trim();
      if (!name) { actInput.focus(); return; }
      activities.push({
        id: Date.now(),
        name,
        category: selectedCategory,
        startHour: modal._start,
        endHour: modal._end,
      });
      save();
      renderActivities();
      closeModal();
    });
    actInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btnSave').click();
      if (e.key === 'Escape') closeModal();
    });
    modal.addEventListener('click', e => {
      if (e.target === modal) closeModal();
    });

    // ===== ACTIVITY LIST =====
    function renderActivities() {
      // Sort by start hour
      activities.sort((a, b) => a.startHour - b.startHour);

      actCount.textContent = activities.length;
      clearBtn.style.display = activities.length > 0 ? 'block' : 'none';

      if (activities.length === 0) {
        actList.innerHTML = `<div class="empty-state" id="emptyState">
          <div class="icon">🕐</div>
          <p>No activities yet.<br>Drag on the clock to get started!</p>
        </div>`;
        return;
      }

      actList.innerHTML = '';
      activities.forEach(act => {
        const cat = CATEGORIES[act.category] || CATEGORIES[5];
        const el = document.createElement('div');
        el.className = 'activity-item';
        el.innerHTML = `
          <div class="activity-dot" style="color:${cat.color};background:${cat.color}"></div>
          <div class="activity-info">
            <div class="activity-name">${escHtml(act.name)}</div>
            <div class="activity-time">${formatHour(act.startHour)} → ${formatHour(act.endHour)}</div>
          </div>
          <button class="activity-delete" data-id="${act.id}" title="Delete">✕</button>
        `;
        actList.appendChild(el);
      });
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    actList.addEventListener('click', e => {
      const btn = e.target.closest('.activity-delete');
      if (!btn) return;
      const id = Number(btn.dataset.id);
      activities = activities.filter(a => a.id !== id);
      save();
      renderActivities();
    });

    clearBtn.addEventListener('click', () => {
      if (!confirm('Clear all activities?')) return;
      activities = [];
      save();
      renderActivities();
    });

    // ===== INIT =====
    renderActivities();
    draw();
  })();
  </script>
</body>
</html>
